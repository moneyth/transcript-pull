<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Download transcripts from any YouTube playlist or video — free." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TranscriptPull" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
  <title>TranscriptPull</title>
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <polygon points="5,3 15,9 5,15" fill="white"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>TranscriptPull</h1>
        <p>YouTube playlist &amp; video transcripts, as plain text</p>
      </div>
    </header>

    <div id="install-banner" class="install-banner" hidden>
      <p><strong>Install the app</strong> — use it like a native app on your home screen.</p>
      <button id="btn-install" class="btn-install">Install</button>
    </div>

    <section class="input-section">
      <div class="input-label">Playlist or video URL</div>
      <div class="input-row">
        <input
          id="url-input"
          class="url-input"
          type="url"
          inputmode="url"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="https://youtube.com/playlist?list=..."
          aria-label="YouTube playlist or video URL"
        />
        <button id="btn-run" class="btn-primary">Get transcripts</button>
      </div>
      <div id="error-msg" class="error-msg" hidden></div>
    </section>

    <section id="progress-section" class="progress-section" hidden>
      <div class="progress-header">
        <span id="progress-label" class="progress-label">Fetching transcripts</span>
        <span id="progress-count" class="progress-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
    </section>

    <div id="download-bar" class="download-bar" hidden>
      <span id="dl-summary" class="download-summary"></span>
      <button id="btn-dl-all" class="btn-download">↓ Download all (.txt)</button>
    </div>

    <div id="video-list" class="video-list" role="list" aria-label="Videos"></div>

    <div id="empty-state" class="empty-state">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <rect x="4" y="4" width="32" height="32" rx="8" stroke="#666" stroke-width="1.5"/>
        <polygon points="16,13 28,20 16,27" fill="#666"/>
      </svg>
      <p>Paste a YouTube playlist or video URL above</p>
    </div>

  </div>
  <script src="/app.js"></script>
</body>
  </html>
